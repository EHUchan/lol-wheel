<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>LoL Champion Wheel</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Winwheel.js/2.8.0/Winwheel.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
color:white;
background:black;
overflow:hidden;
}

/* animated background */

.background{
position:fixed;
width:100%;
height:100%;
background-image:url("https://ddragon.leagueoflegends.com/cdn/img/champion/splash/MissFortune_0.jpg");
background-size:cover;
background-position:center;
filter:brightness(0.25);
z-index:-1;
}

/* container */

.container{
text-align:center;
margin-top:30px;
}

h1{
font-size:60px;
letter-spacing:3px;
margin-bottom:30px;
}

/* wheel */

canvas{
background:rgba(0,0,0,0.4);
border-radius:50%;
}

/* button */

button{

margin-top:40px;
padding:20px 80px;
font-size:26px;

background:#c89b3c;
color:black;

border:none;
border-radius:8px;

cursor:pointer;

font-weight:bold;
transition:0.2s;

}

button:hover{

transform:scale(1.05);
background:#e4b653;

}

#result{

margin-top:40px;
font-size:40px;

}

</style>

</head>

<body>

<div class="background"></div>

<div class="container">

<h1>Champion Wheel</h1>

<canvas id="wheelCanvas" width="700" height="700"></canvas>

<br>

<button onclick="spin()">SPIN</button>

<div id="result"></div>

<audio id="voice"></audio>

</div>

<script>

let champions = []

/* RIOT DATA DRAGON CHAMPIONS */

fetch("https://ddragon.leagueoflegends.com/cdn/13.24.1/data/en_US/champion.json")
.then(res => res.json())
.then(data => {

let champData = data.data

for(let key in champData){

champions.push(champData[key].name)

}

createWheel()

})

let wheel

function createWheel(){

let segments = champions.map(name => {

return {

fillStyle: Math.random() > 0.5 ? "#1e293b" : "#334155",
text: name

}

})

wheel = new Winwheel({

canvasId:'wheelCanvas',

numSegments: segments.length,

outerRadius:320,

textFontSize:10,

segments:segments,

animation:{
type:'spinToStop',
duration:7,
spins:10,
callbackFinished:championResult
}

})

}

function spin(){

wheel.startAnimation()

}

function championResult(segment){

document.getElementById("result").innerText =
"Selected Champion: " + segment.text

playVoice(segment.text)

}

/* champion voice */

function playVoice(name){

let voice = document.getElementById("voice")

let file = name.replace(" ","")

voice.src =
"https://raw.githubusercontent.com/CommunityDragon/Raw/master/plugins/rcp-be-lol-game-data/global/default/v1/champions/" + file + "/skins/base/vo/en_us/attack1.ogg"

voice.play().catch(()=>{})

}

</script>

</body>
</html>
