<!DOCTYPE html>
<html>

<head>

<title>LoL Wheel</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
margin-top:100px;
}

h1{
font-size:50px;
}

button{
padding:15px 40px;
font-size:22px;
background:#22c55e;
border:none;
border-radius:10px;
cursor:pointer;
}

#result{
margin-top:40px;
font-size:35px;
}

</style>

</head>

<body>

<h1>🎡 LoL Champion Wheel</h1>

<button onclick="spin()">SPIN</button>

<div id="result"></div>

<script>

const champions = [
"Ahri",
"Yasuo",
"Zed",
"Katarina",
"Lux",
"Miss Fortune"
]

function spin(){

let random = Math.floor(Math.random()*champions.length)

document.getElementById("result").innerText =
"Champion: " + champions[random]

}

</script>

</body>

</html>
